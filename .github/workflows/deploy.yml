name: Deploy

on:
  push:
    branches: [main]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: backend-ts/package-lock.json

      - name: Install dependencies
        working-directory: backend-ts
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend-ts
        run: npx prisma generate

      - name: Run tests
        working-directory: backend-ts
        run: npm test

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm run test:run

  # Railway deploys automatically on push to main.
  # This workflow ensures tests pass — Railway will only see the push
  # if CI is green (configure branch protection to require this).
