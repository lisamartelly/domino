version: "3"

tasks:
  # ----------------------------------
  # Start PostgreSQL dev database
  # ----------------------------------
  up-db:
    desc: "Start PostgreSQL development database container"
    cmds:
      - docker compose up -d

  # ----------------------------------
  # Run NestJS backend
  # ----------------------------------
  api:
    desc: "Run NestJS backend"
    dir: backend-ts
    ignore_error: true
    cmds:
      - npm install
      - |
        if [ "${WATCH}" = "true" ]; then
          echo "Starting NestJS backend in WATCH mode..."
          npm run start:dev
        else
          echo "Starting NestJS backend..."
          npm run start
        fi

  # ----------------------------------
  # Run backend tests
  # ----------------------------------
  api-test:
    desc: "Run NestJS backend tests"
    dir: backend-ts
    cmds:
      - npm test

  api-test-watch:
    desc: "Run NestJS backend tests in watch mode"
    dir: backend-ts
    cmds:
      - npm run test:watch

  # ----------------------------------
  # Lint backend
  # ----------------------------------
  api-lint:
    desc: "Check NestJS code for lint errors"
    dir: backend-ts
    cmds:
      - npm run lint

  # ----------------------------------
  # Run React frontend
  # ----------------------------------
  client:
    desc: "Run React frontend"
    dir: frontend
    ignore_error: true
    cmds:
      - npm install
      - |
        if [ "${WATCH}" = "true" ]; then
          echo "Starting React frontend in WATCH mode..."
          npm run dev
        else
          echo "Starting React frontend..."
          npm start
        fi

  # ----------------------------------
  # Run frontend tests
  # ----------------------------------
  client-test:
    desc: "Run React frontend tests"
    dir: frontend
    cmds:
      - npm run test:run

  client-test-watch:
    desc: "Run React frontend tests in watch mode"
    dir: frontend
    cmds:
      - npm test

  # ----------------------------------
  # Test all projects
  # ----------------------------------
  test:
    desc: "Run backend and frontend tests"
    cmds:
      - task: api-test
      - task: client-test

  # ----------------------------------
  # Lint React frontend
  # ----------------------------------
  client-lint:
    desc: "Check React code for lint errors"
    dir: frontend
    cmds:
      - npm run lint

  client-lint-fix:
    desc: "Auto-fix React lint errors"
    dir: frontend
    cmds:
      - npm run lint:fix

  # ----------------------------------
  # Lint all projects
  # ----------------------------------
  lint:
    desc: "Lint backend and frontend"
    cmds:
      - task: api-lint
      - task: client-lint

  lint-fix:
    desc: "Auto-fix lint errors in backend and frontend"
    cmds:
      - task: api-lint
      - task: client-lint-fix

  # ----------------------------------
  # Tail PostgreSQL logs
  # ----------------------------------
  db-logs:
    desc: "Tail PostgreSQL container logs"
    ignore_error: true
    cmds:
      - docker logs -f domino-db-1

  # ----------------------------------
  # Full dev environment
  # ----------------------------------
  dev:
    desc: "Start DB, backend, frontend, and PostgreSQL logs"
    preconditions:
      - "docker --version || { echo 'Docker is required!'; exit 1; }"
    cmds:
      - task: up-db
      - |
        task api &
        task client &
        task db-logs &
        wait || true

  # ----------------------------------
  # Start without hot reload
  # ----------------------------------
  start:
    desc: "Start backend and frontend (no watch)"
    cmds:
      - WATCH=false task dev

  # ----------------------------------
  # Start with hot reload
  # ----------------------------------
  watch:
    desc: "Start backend and frontend with watch mode"
    cmds:
      - WATCH=true task dev
